<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - AfroFlame</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      border: 1px solid #222;
      text-align: center;
    }

    h2 {
      color: #ff7a00;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #ff9800;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: white;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  fetch("http://localhost:3000/api/admin/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("admin", JSON.stringify(data.admin));
      window.location.href = "admin.html";
    } else {
      alert("Invalid login");
    }
  });
}
</script>

</body>
</html>
